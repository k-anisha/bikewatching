<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="map.css" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

    <!-- Mapbox GL JS CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

    <title>Anisha Kalgi: Bikewatching</title>
</head>

<body>

    <header>
        <h1>🚴🏼‍♀️ Bikewatching</h1>

        <label>
            Filter by time:
            <input type="range" min="-1" max="1440" value="-1" id="time-slider" />
            <time id="selected-time"></time>
            <em id="any-time">(any time)</em>
        </label>
    </header>

    <div id="map">
        <svg></svg>
    </div>

    <script type="module" src="map.js"></script>

    <div class="legend">
        <div class="swatch dep">More departures</div>
        <div class="swatch bal">Balanced</div>
        <div class="swatch arr">More arrivals</div>
    </div>
</body>

</html>
